spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Disable Cloudinary during tests
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

# Disable JWT for simple context load tests
app.jwt.secret=test-secret-key-for-testing-only-must-be-at-least-256-bits-long
app.jwt.expiration-ms=86400000

# Disable multipart during tests
spring.servlet.multipart.enabled=false

# Default bootstrap accounts for tests
app.default-admin.username=admin
app.default-admin.email=admin@school.com
app.default-admin.password=Admin@123
