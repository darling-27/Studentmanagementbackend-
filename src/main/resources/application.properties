spring.application.name=demo


# ===== MySQL =====
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:railway}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true

spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ===== HikariCP =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== File upload limits =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== JWT =====
# Base64-encoded secret. Generate with: openssl rand -base64 48
app.jwt.secret=${APP_JWT_SECRET:ZHVtbXktc2VjcmV0LWtleS1jaGFuZ2UtdGhpcy10by1hLXJlYWwtMjU2LWJpdC1rZXk=}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ===== Cloudinary =====
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:rlmlhn53}
cloudinary.api-key=${CLOUDINARY_API_KEY:863517165775426}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:xW5VZ2BjCZ52XeoNuJj-pLuXejU}

# ===== Default bootstrap accounts =====
app.default-admin.username=${ADMIN_USERNAME:admin}
app.default-admin.email=${ADMIN_EMAIL:admin@school.com}
app.default-admin.password=${ADMIN_PASSWORD:Admin@123}
app.default-student.username=${STUDENT_USERNAME:student}
app.default-student.password=${STUDENT_PASSWORD:Student@123}
app.default-student.full-name=${STUDENT_FULL_NAME:Leela Sankar}
